name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: GUT (unit + integration)
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.6.2"
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: ~/godot
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Install Godot ${{ env.GODOT_VERSION }} (headless)
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot
          curl -fsSL -o /tmp/godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d ~/godot
          mv ~/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64 ~/godot/godot
          chmod +x ~/godot/godot

      - name: Add Godot to PATH
        run: echo "$HOME/godot" >> "$GITHUB_PATH"

      - name: Verify Godot
        run: godot --version

      - name: Import project (populates .godot cache)
        run: |
          # `--import` exits non-zero on harmless reimport messages on some
          # versions; tolerate it and rely on the test step to surface real
          # problems.
          godot --headless --path godot --import || true

      - name: Run GUT
        run: |
          godot --headless --path godot \
            -s addons/gut/gut_cmdln.gd \
            -gconfig=res://.gutconfig.json
