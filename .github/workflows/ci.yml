name: ci

on:
  push:
    branches: [main]
  pull_request:

# Pages deploy needs id-token for OIDC; pages: write to publish.
permissions:
  contents: read
  pages: write
  id-token: write

env:
  GODOT_VERSION: "4.6.2"
  GODOT_RELEASE_BASE: "https://github.com/godotengine/godot/releases/download/4.6.2-stable"

jobs:
  test:
    name: GUT (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: ~/godot
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Install Godot ${{ env.GODOT_VERSION }} (headless)
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot
          curl -fsSL -o /tmp/godot.zip \
            "${GODOT_RELEASE_BASE}/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d ~/godot
          mv ~/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64 ~/godot/godot
          chmod +x ~/godot/godot

      - name: Add Godot to PATH
        run: echo "$HOME/godot" >> "$GITHUB_PATH"

      - name: Verify Godot
        run: godot --version

      - name: Lint — no class_name in per-game core/
        run: |
          if grep -rn '^class_name ' godot/scripts/*/core/; then
            echo "::error::per-game core/ scripts must not declare class_name (see issue #33)"
            exit 1
          fi

      - name: Import project (populates .godot cache)
        run: |
          # `--import` exits non-zero on harmless reimport messages on some
          # versions; tolerate it and rely on the test step to surface real
          # problems.
          godot --headless --path godot --import || true

      - name: Run GUT
        run: |
          godot --headless --path godot \
            -s addons/gut/gut_cmdln.gd \
            -gconfig=res://.gutconfig.json

      - name: Cold-load smoke (subprocess, not GUT)
        run: |
          # Run in a fresh process so the global class table is empty —
          # reproduces what a user hits on a real cold launch from the menu.
          # GUT pre-compiles every test file at suite start, which warms the
          # class table and hides the bug in #33. Belt-and-suspenders: check
          # both exit code and stderr for SCRIPT ERROR (Godot can print
          # compile errors without setting non-zero exit).
          godot --headless --path godot --script res://tests/cold_load_smoke.gd 2> stderr.log
          if grep -q "SCRIPT ERROR" stderr.log; then
            cat stderr.log
            echo "::error::SCRIPT ERROR detected during cold-load"
            exit 1
          fi

  export-web:
    name: Export Web (Pages)
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Serialize Pages deploys (Pages allows one live deployment per environment).
    # Job-scoped — keeps PR `test` runs from queuing behind a main-branch deploy.
    concurrency:
      group: pages
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: ~/godot
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Install Godot ${{ env.GODOT_VERSION }} (headless)
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot
          curl -fsSL -o /tmp/godot.zip \
            "${GODOT_RELEASE_BASE}/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d ~/godot
          mv ~/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64 ~/godot/godot
          chmod +x ~/godot/godot

      - name: Add Godot to PATH
        run: echo "$HOME/godot" >> "$GITHUB_PATH"

      - name: Cache export templates
        id: templates-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          key: godot-templates-${{ env.GODOT_VERSION }}-stable
          restore-keys: |
            godot-templates-

      - name: Install export templates
        if: steps.templates-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          curl -fsSL -o /tmp/templates.tpz \
            "${GODOT_RELEASE_BASE}/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          # The .tpz is a zip with files at the top level; unzip into the templates dir.
          unzip -q /tmp/templates.tpz -d /tmp/templates
          # The zip contains a `templates/` folder; flatten it.
          mv /tmp/templates/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"

      - name: Import project
        run: godot --headless --path godot --import || true

      - name: Build Web export
        run: |
          mkdir -p build/web
          godot --headless --path godot --export-release "Web" ../build/web/index.html
          ls -lh build/web/

      - name: Add .nojekyll
        run: touch build/web/.nojekyll

      - name: Inject build marker
        run: |
          # Pages CDN can serve stale HTML; embed the commit SHA so the
          # post-deploy check can prove it sees the bundle that was just built.
          # See docs/learning/2026-05-03-pages-bootstrap.md.
          sed -i "s|</head>|<meta name=\"build-sha\" content=\"${{ github.sha }}\"></head>|" build/web/index.html
          grep -q "build-sha" build/web/index.html

      - name: Smoke-check exported files
        run: |
          test -s build/web/index.html
          test -s build/web/index.wasm
          test -s build/web/index.pck
          # The Godot 4.x web template launches via a `Engine` JS object; grep
          # for it as a sanity guard against future template renames.
          grep -q 'Engine' build/web/index.html

      - name: Setup Pages
        # Pinned to commit SHA (was @v5) per #39 — floating tags can be
        # re-pointed; the failure class we hit was "trusted setup-time state",
        # and SHA pinning closes a similar door. enablement:true bootstraps
        # Pages on a fresh fork; in this repo Pages is already enabled, so it
        # is a no-op here but matters for forks. See docs/learning/2026-05-03-
        # pages-bootstrap.md for the full rationale (incl. PAT requirement).
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to Pages
        id: deployment
        # Pinned to commit SHA (was @v4) per #39.
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e

      - name: Post-deploy verification (assets + freshness)
        run: |
          # Verify the deploy actually served what we built. Three checks:
          # (a) HEAD on the asset triplet returns 200,
          # (b) GET on index.html contains the build-sha marker we injected,
          # (c) the marker matches THIS run's commit (not stale CDN cache).
          # 12×10s = 2 min retry budget — Pages CDN propagation has been
          # observed to exceed 30s in practice. See #39 acceptance #2.
          url="${{ steps.deployment.outputs.page_url }}"
          expected="${{ github.sha }}"
          for i in $(seq 1 12); do
            ok=1
            for asset in index.html index.wasm index.pck; do
              code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 -I "${url}${asset}" || echo 000)
              [ "$code" = "200" ] || { echo "attempt $i: $asset → $code"; ok=0; break; }
            done
            if [ $ok -eq 1 ]; then
              sha=$(curl -fsSL --max-time 10 "${url}index.html" | grep -oE 'build-sha" content="[a-f0-9]+"' | cut -d'"' -f3 || echo "")
              if [ "$sha" = "$expected" ]; then
                echo "live and fresh: $url (sha $sha)"
                exit 0
              fi
              echo "attempt $i: served sha '$sha', expected '$expected'"
            fi
            sleep 10
          done
          echo "::error::post-deploy verification failed after 12×10s"
          exit 1
